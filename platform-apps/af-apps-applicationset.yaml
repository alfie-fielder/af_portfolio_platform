apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: af-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/alfie-fielder/af_portfolio_apps
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/alfie-fielder/af_portfolio_apps
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true